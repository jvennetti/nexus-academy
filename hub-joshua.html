<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Joshua's Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0e1a;
    --navy2: #0d1220;
    --panel: #111827;
    --panel2: #0f1520;
    --blue: #00c8ff;
    --blue-dim: #0090bb;
    --blue-glow: rgba(0,200,255,0.15);
    --amber: #ffaa00;
    --amber-dim: #cc8800;
    --green: #00ff88;
    --grey: #4a5568;
    --grey2: #2d3748;
    --white: #e8edf5;
    --muted: #6b7a94;
    --border: rgba(0,200,255,0.12);
    --border2: rgba(0,200,255,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,200,255,0.012) 2px,
      rgba(0,200,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .hub {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-left { display: flex; align-items: center; gap: 16px; }

  .ciro-dot-cluster { display: flex; gap: 5px; align-items: center; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 6px var(--blue);
    animation: pulse-blue 2.4s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.4s; }
  .dot:nth-child(3) { animation-delay: 0.8s; }

  @keyframes pulse-blue {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--blue); }
    50% { opacity: 0.4; box-shadow: 0 0 2px var(--blue); }
  }

  .nexus-label {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.35em;
    color: var(--blue);
    text-transform: uppercase;
  }

  .operator-name {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 0.08em;
  }

  .operator-name span {
    color: var(--blue);
    text-shadow: 0 0 12px var(--blue);
  }

  .header-right { text-align: right; }

  .ciro-line {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.04em;
  }

  /* ─── PROGRESS BAR ─── */
  .progress-section {
    margin-bottom: 40px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .progress-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .progress-pct {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--blue);
    text-shadow: 0 0 10px var(--blue);
  }

  .progress-track {
    height: 4px;
    background: var(--grey2);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue-dim), var(--blue));
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 8px var(--blue);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    animation: shimmer 2s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  .progress-modules {
    display: flex;
    gap: 4px;
    margin-top: 10px;
  }

  .prog-pip {
    flex: 1;
    height: 2px;
    border-radius: 1px;
    background: var(--grey2);
    transition: background 0.5s ease;
  }
  .prog-pip.done { background: var(--blue); box-shadow: 0 0 4px var(--blue); }

  /* ─── MODULE CARDS ─── */
  .section-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .modules-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 44px;
  }

  .module-card {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border2);
    transition: border-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    aspect-ratio: 4 / 1;
    background: var(--panel2);
  }

  .module-card:hover {
    transform: translateY(-1px);
    border-color: rgba(0,200,255,0.25);
    box-shadow: 0 4px 24px rgba(0,200,255,0.08);
  }

  .module-card.unlocked:hover {
    border-color: rgba(0,200,255,0.4);
    box-shadow: 0 4px 32px rgba(0,200,255,0.15);
  }

  .module-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.5s ease;
  }

  .module-card .card-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px 16px;
    background: linear-gradient(to right, rgba(0,0,0,0.55) 0%, transparent 60%);
  }

  .card-tag {
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.35em;
    color: var(--blue);
    text-transform: uppercase;
    margin-bottom: 2px;
    opacity: 0.8;
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.06em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  .card-status {
    position: absolute;
    top: 10px;
    right: 12px;
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .card-status.locked-tag {
    color: var(--muted);
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .card-status.unlocked-tag {
    color: var(--blue);
    background: rgba(0,200,255,0.08);
    border: 1px solid rgba(0,200,255,0.25);
    text-shadow: 0 0 6px var(--blue);
  }

  /* ─── NEXT LESSON BUTTON ─── */
  .next-lesson-section {
    margin-bottom: 44px;
  }

  .next-lesson-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border: 1px solid rgba(0,200,255,0.2);
    border-radius: 8px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    width: 100%;
  }

  .next-lesson-btn:hover {
    background: rgba(0,200,255,0.05);
    border-color: rgba(0,200,255,0.4);
    box-shadow: 0 0 20px rgba(0,200,255,0.08);
  }

  .next-lesson-left { display: flex; flex-direction: column; gap: 3px; text-align: left; }

  .next-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--blue);
    text-transform: uppercase;
  }

  .next-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.04em;
  }

  .next-arrow {
    font-size: 20px;
    color: var(--blue);
    text-shadow: 0 0 8px var(--blue);
  }

  /* ─── BADGES ─── */
  .badges-section { margin-bottom: 20px; }

  .badges-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .badge-item {
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 14px 10px;
    text-align: center;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .badge-item.earned {
    border-color: rgba(0,200,255,0.25);
    background: rgba(0,200,255,0.04);
  }

  .badge-item.earned.grand {
    border-color: rgba(255,170,0,0.4);
    background: rgba(255,170,0,0.06);
    grid-column: 1 / -1;
  }

  .badge-item.locked-badge {
    opacity: 0.35;
    filter: grayscale(1);
  }

  .badge-icon {
    font-size: 22px;
    margin-bottom: 6px;
    display: block;
    filter: drop-shadow(0 0 6px currentColor);
  }

  .badge-item.locked-badge .badge-icon { filter: none; opacity: 0.4; }

  .badge-name {
    font-family: 'Orbitron', monospace;
    font-size: 7.5px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    line-height: 1.3;
  }

  .badge-item.earned .badge-name { color: var(--blue); }
  .badge-item.earned.grand .badge-name { color: var(--amber); }

  .badge-type {
    font-family: 'Rajdhani', sans-serif;
    font-size: 9px;
    color: var(--grey);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Badge unlock flash */
  @keyframes badge-unlock {
    0% { transform: scale(0.8); opacity: 0; }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  .badge-item.just-unlocked {
    animation: badge-unlock 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    border-color: var(--blue);
    box-shadow: 0 0 20px rgba(0,200,255,0.3);
  }

  /* ─── PASSCODE SECTION ─── */
  .passcode-section {
    margin-top: 36px;
    background: var(--panel);
    border: 1px solid rgba(255,170,0,0.15);
    border-radius: 8px;
    padding: 20px 24px;
    display: none;
  }

  .passcode-section.visible { display: block; }

  .passcode-header {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .passcode-value {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: var(--amber);
    letter-spacing: 0.2em;
    text-shadow: 0 0 20px var(--amber);
  }

  .passcode-line {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    font-style: italic;
  }

  /* ─── RESET ─── */
  .reset-btn {
    margin-top: 48px;
    display: block;
    background: none;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    color: rgba(255,255,255,0.12);
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    width: 100%;
  }
  .reset-btn:hover {
    border-color: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.25);
  }

  /* ─── FLASH NOTIFICATION ─── */
  .flash {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--panel);
    border: 1px solid var(--blue);
    border-radius: 6px;
    padding: 12px 20px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--blue);
    text-shadow: 0 0 8px var(--blue);
    z-index: 9999;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 24px rgba(0,200,255,0.2);
    white-space: nowrap;
  }
  .flash.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="hub">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="ciro-dot-cluster">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div>
        <div class="nexus-label">NEXUS Academy — Operator Hub</div>
        <div class="operator-name">JOSHUA <span>▸</span></div>
      </div>
    </div>
    <div class="header-right">
      <div class="ciro-line" id="ciro-greeting">Transmission standing by.</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="progress-header">
      <div class="progress-label">Operator Progress</div>
      <div class="progress-pct" id="pct-display">0%</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-modules" id="progress-pips"></div>
  </div>

  <!-- MODULE CARDS -->
  <div class="section-label">Modules</div>
  <div class="modules-grid" id="modules-grid"></div>

  <!-- NEXT LESSON -->
  <div class="next-lesson-section" id="next-lesson-section" style="display:none;">
    <div class="section-label">Continue Transmission</div>
    <a class="next-lesson-btn" id="next-lesson-btn" href="#" target="_blank">
      <div class="next-lesson-left">
        <div class="next-label" id="next-module-tag">—</div>
        <div class="next-title" id="next-lesson-title">—</div>
      </div>
      <div class="next-arrow">→</div>
    </a>
  </div>

  <!-- BADGES -->
  <div class="badges-section">
    <div class="section-label">Achievements</div>
    <div class="badges-grid" id="badges-grid"></div>
  </div>

  <!-- PASSCODE (hidden until Module 6 complete) -->
  <div class="passcode-section" id="passcode-section">
    <div class="passcode-header">⚡ Passcode Transmission — AMBER CHANNEL</div>
    <div class="passcode-value">77POWER</div>
    <div class="passcode-line">Bring this to the Machine. All three Operators must be present.</div>
  </div>

  <!-- RESET -->
  <button class="reset-btn" onclick="resetProgress()">[ SYSTEM RESET — DEV ONLY ]</button>

</div>

<script>
const OPERATOR = 'joshua';

// ─── MODULE DATA ───
const MODULES = [
  {
    key: 'precourse',
    label: 'Pre-Course',
    title: 'BEFORE YOU BEGIN',
    lockedImg: 'https://jvennetti.github.io/nexus-academy/Module_1_Locked.png',
    unlockedImg: 'https://jvennetti.github.io/nexus-academy/Module_1_Unlocked.png',
    notionUrl: '#',
    badge: null,
    nextLesson: { module: 'Pre-Course', title: 'Getting Started with Notion', url: '#' }
  },
  {
    key: 'mod1',
    label: 'Module 1',
    title: 'BOOT UP',
    lockedImg: 'https://jvennetti.github.io/nexus-academy/Module_2_Locked.png',
    unlockedImg: 'https://jvennetti.github.io/nexus-academy/Module_2_Unlocked.png',
    notionUrl: '#',
    badge: 'system_online',
    nextLesson: { module: 'Module 1', title: 'The Only AI Tools You\'ll Ever Need', url: '#' }
  },
  {
    key: 'mod2',
    label: 'Module 2',
    title: 'THE PROMPT ENGINEER',
    lockedImg: 'https://jvennetti.github.io/nexus-academy/Module_3_Locked.png',
    unlockedImg: 'https://jvennetti.github.io/nexus-academy/Module_3_Unlocked.png',
    notionUrl: '#',
    badge: 'signal_steady',
    nextLesson: { module: 'Module 2', title: 'Claude vs ChatGPT', url: '#' }
  },
  {
    key: 'mod3',
    label: 'Module 3',
    title: 'THE AUTOMATION LAYER',
    lockedImg: 'https://jvennetti.github.io/nexus-academy/Module_4_Locked.png',
    unlockedImg: 'https://jvennetti.github.io/nexus-academy/Module_4_Unlocked.png',
    notionUrl: '#',
    badge: 'hands_on',
    nextLesson: { module: 'Module 3', title: 'Introducing Cowork', url: '#' }
  },
  {
    key: 'mod4',
    label: 'Module 4',
    title: 'THE AGENT BLUEPRINT',
    lockedImg: 'https://jvennetti.github.io/nexus-academy/Module_5_Locked.png',
    unlockedImg: 'https://jvennetti.github.io/nexus-academy/Module_5_Unlocked.png',
    notionUrl: '#',
    badge: 'architect',
    nextLesson: { module: 'Module 4', title: 'How to Build AI Agents in 2026', url: '#' }
  },
  {
    key: 'mod5',
    label: 'Module 5',
    title: 'LEAD GENERATION MACHINE',
    lockedImg: 'https://jvennetti.github.io/nexus-academy/Module_6_Locked.png',
    unlockedImg: 'https://jvennetti.github.io/nexus-academy/Module_6_Unlocked.png',
    notionUrl: '#',
    badge: 'pipeline_inventor',
    nextLesson: { module: 'Module 5', title: 'Getting Started with Research', url: '#' }
  },
  {
    key: 'mod6',
    label: 'Module 6',
    title: 'CLIENT READY',
    lockedImg: 'https://jvennetti.github.io/nexus-academy/Module_7_Locked.png',
    unlockedImg: 'https://jvennetti.github.io/nexus-academy/Module_7_Unlocked.png',
    notionUrl: '#',
    badge: 'operator',
    nextLesson: { module: 'Module 6', title: 'How to Build a $10M Solo AI Business', url: '#' }
  }
];

// ─── BADGE DATA ───
const BADGES = [
  // Module completion
  { key: 'system_online',     name: 'SYSTEM ONLINE',      icon: '⚡', type: 'Module 1',   kind: 'module' },
  { key: 'signal_steady',     name: 'SIGNAL STEADY',      icon: '📡', type: 'Module 2',   kind: 'module' },
  { key: 'hands_on',          name: 'HANDS ON',           icon: '⚙️', type: 'Module 3',   kind: 'module' },
  { key: 'architect',         name: 'ARCHITECT',          icon: '🏗️', type: 'Module 4',   kind: 'module' },
  { key: 'pipeline_inventor', name: 'PIPELINE INVENTOR',  icon: '🔗', type: 'Module 5',   kind: 'module' },
  { key: 'operator',          name: 'OPERATOR',           icon: '🎯', type: 'Module 6',   kind: 'module' },
  // Challenge
  { key: 'constructor',       name: 'CONSTRUCTOR',        icon: '🌐', type: 'Challenge',  kind: 'challenge' },
  { key: 'the_switch',        name: 'THE SWITCH',         icon: '🔄', type: 'Challenge',  kind: 'challenge' },
  { key: 'commander',         name: 'COMMANDER',          icon: '🤖', type: 'Challenge',  kind: 'challenge' },
  { key: 'field_operator',    name: 'FIELD OPERATOR',     icon: '🎖️', type: 'Challenge',  kind: 'challenge' },
  { key: 'predestined_to',    name: 'PREDESTINED TO',     icon: '∞',  type: 'Final Task', kind: 'challenge' },
  // Grand
  { key: 'nexus',             name: 'NEXUS',              icon: '✦',  type: 'Grand',      kind: 'grand' },
];

// ─── STATE ───
function getState() {
  try {
    return JSON.parse(localStorage.getItem(`nexus_${OPERATOR}`) || '{}');
  } catch(e) { return {}; }
}

function setState(s) {
  localStorage.setItem(`nexus_${OPERATOR}`, JSON.stringify(s));
}

// ─── RENDER ───
function render() {
  const state = getState();
  renderModules(state);
  renderProgress(state);
  renderBadges(state);
  renderNextLesson(state);
  renderPasscode(state);
  renderGreeting(state);
}

function renderModules(state) {
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';

  MODULES.forEach(mod => {
    const unlocked = !!state[`${mod.key}_complete`];
    const card = document.createElement('div');
    card.className = `module-card ${unlocked ? 'unlocked' : 'locked'}`;
    card.dataset.key = mod.key;

    card.innerHTML = `
      <img src="${unlocked ? mod.unlockedImg : mod.lockedImg}" alt="${mod.title}" loading="lazy">
      <div class="card-overlay">
        <div class="card-tag">${mod.label}</div>
        <div class="card-title">${mod.title}</div>
      </div>
      <div class="card-status ${unlocked ? 'unlocked-tag' : 'locked-tag'}">${unlocked ? 'UNLOCKED' : 'LOCKED'}</div>
    `;

    if (unlocked) {
      card.addEventListener('click', () => {
        if (mod.notionUrl && mod.notionUrl !== '#') {
          window.open(mod.notionUrl, '_blank');
        }
      });
    }

    grid.appendChild(card);
  });
}

function renderProgress(state) {
  const completed = MODULES.filter(m => state[`${m.key}_complete`]).length;
  const total = MODULES.length;
  const pct = Math.round((completed / total) * 100);

  document.getElementById('pct-display').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  const pips = document.getElementById('progress-pips');
  pips.innerHTML = '';
  MODULES.forEach(mod => {
    const pip = document.createElement('div');
    pip.className = `prog-pip ${state[`${mod.key}_complete`] ? 'done' : ''}`;
    pips.appendChild(pip);
  });
}

function renderBadges(state) {
  const grid = document.getElementById('badges-grid');
  grid.innerHTML = '';

  BADGES.forEach(badge => {
    const earned = !!state[`badge_${badge.key}`];
    const item = document.createElement('div');
    item.className = `badge-item ${earned ? 'earned' : 'locked-badge'} ${badge.kind === 'grand' ? 'grand' : ''}`;
    item.id = `badge-${badge.key}`;

    item.innerHTML = `
      <span class="badge-icon">${badge.icon}</span>
      <div class="badge-name">${badge.name}</div>
      <div class="badge-type">${badge.type}</div>
    `;

    grid.appendChild(item);
  });
}

function renderNextLesson(state) {
  // Find first in-progress module (unlocked but not complete? No — find first incomplete module that is available)
  // Logic: show next lesson for the earliest incomplete module
  const section = document.getElementById('next-lesson-section');
  let found = null;

  for (let i = 0; i < MODULES.length; i++) {
    const mod = MODULES[i];
    if (!state[`${mod.key}_complete`]) {
      found = mod;
      break;
    }
  }

  if (found) {
    section.style.display = 'block';
    document.getElementById('next-module-tag').textContent = found.label;
    document.getElementById('next-lesson-title').textContent = found.nextLesson.title;
    const btn = document.getElementById('next-lesson-btn');
    btn.href = found.nextLesson.url;
    if (found.nextLesson.url !== '#') btn.target = '_blank';
  } else {
    // All complete
    section.style.display = 'none';
  }
}

function renderPasscode(state) {
  const section = document.getElementById('passcode-section');
  if (state['badge_predestined_to']) {
    section.classList.add('visible');
  }
}

function renderGreeting(state) {
  const completed = MODULES.filter(m => state[`${m.key}_complete`]).length;
  const greetings = [
    'Transmission standing by.',
    'First module confirmed. Signal is steady.',
    'Two sequences complete. You\'re building something.',
    'Halfway through. The hard part is behind you.',
    'Four modules complete. The system is taking shape.',
    'Five down. One remains.',
    'All modules complete. Well done, Operator.'
  ];
  document.getElementById('ciro-greeting').textContent = greetings[Math.min(completed, 6)];
}

// ─── UNLOCK FUNCTIONS (called from module completion pages via postMessage) ───
function unlockModule(moduleKey) {
  const state = getState();
  if (state[`${moduleKey}_complete`]) return;

  state[`${moduleKey}_complete`] = true;

  // Award corresponding badge
  const mod = MODULES.find(m => m.key === moduleKey);
  if (mod && mod.badge) {
    state[`badge_${mod.badge}`] = true;
    setTimeout(() => flashBadge(mod.badge), 600);
  }

  setState(state);
  render();
  showFlash(`${mod ? mod.label : moduleKey} — TRANSMISSION COMPLETE`);
}

function unlockChallengeBadge(badgeKey) {
  const state = getState();
  if (state[`badge_${badgeKey}`]) return;
  state[`badge_${badgeKey}`] = true;
  setState(state);
  render();
  flashBadge(badgeKey);
  const badge = BADGES.find(b => b.key === badgeKey);
  showFlash(`ACHIEVEMENT UNLOCKED — ${badge ? badge.name : badgeKey}`);
}

function flashBadge(badgeKey) {
  const el = document.getElementById(`badge-${badgeKey}`);
  if (el) {
    el.classList.add('just-unlocked');
    setTimeout(() => el.classList.remove('just-unlocked'), 600);
  }
}

function showFlash(msg) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

// ─── postMessage listener (for completion widgets on same GitHub domain) ───
window.addEventListener('message', (e) => {
  if (e.origin !== 'https://jvennetti.github.io') return;
  if (!e.data || !e.data.type) return;

  if (e.data.type === 'MODULE_COMPLETE' && e.data.operator === OPERATOR) {
    unlockModule(e.data.moduleKey);
  }
  if (e.data.type === 'BADGE_EARNED' && e.data.operator === OPERATOR) {
    unlockChallengeBadge(e.data.badgeKey);
  }
});

// ─── DEV: expose unlock functions globally for testing ───
window.nexus = { unlockModule, unlockChallengeBadge, getState, setState };

function resetProgress() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    localStorage.removeItem(`nexus_${OPERATOR}`);
    render();
    showFlash('SYSTEM RESET — ALL PROGRESS CLEARED');
  }
}

// ─── INIT ───
render();
</script>
</body>
</html>
